<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PvZ Portable — Web (Auto-launch + In-game Import)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #eee;
      font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }
    body.upload-mode {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
    }
    body.game-mode { overflow: hidden; }

    /* ── Upload / Loader screen ── */
    #upload-screen {
      text-align: center;
      padding: 2em 1.25em;
      max-width: 520px;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .5em;
    }

    #upload-screen h1 {
      font-size: 1.6em;
      font-weight: 700;
      color: #fff;
      letter-spacing: .01em;
      margin-bottom: .15em;
    }

    #ritsu-gif {
      width: 200px;
      height: 200px;
      margin-bottom: 24px;
      display: block;
    }

    /* project links */
    #project-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: .75em;
      font-size: .82em;
      margin-bottom: .25em;
    }
    #project-links a { color: #ff79c6; text-decoration: underline; }
    #project-links a:hover { color: #fff; }

    #upload-screen p {
      font-size: .83em;
      color: #888;
      line-height: 1.5;
    }
    #upload-screen p strong { color: #ccc; }

    /* ── file rows ── */
    .file-row {
      display: flex;
      align-items: baseline;
      gap: .5em;
      font-size: .88em;
      margin: .15em 0;
    }
    .file-name  { color: #ff79c6; font-weight: 600; white-space: nowrap; }
    .file-status {
      color: #ffeb3b;
      font-size: .85em;
      white-space: nowrap;
    }
    .file-status.done  { color: #00e676; }
    .file-status.error { color: #ff5555; }

    /* resource progress wrapper */
    #server-load-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .1em;
      margin: .5em 0;
    }

    #resources-ready-msg {
      display: none;
      color: #00e676;
      font-size: .88em;
      font-weight: 600;
      margin-top: .35em;
    }

    /* loading inline status */
    #loading-drop-zone {
      display: none;
      font-size: .82em;
      color: #ffeb3b;
      margin-top: .4em;
    }
    #loading-drop-zone.has-error { color: #ff5555; }

    /* ── Launch button (hidden but kept for fallback, auto-start will trigger) ── */
    #launch-btn {
      display: none;
      margin-top: .75em;
      background: #000;
      color: #ff79c6;
      border: 2px solid #ff79c6;
      border-radius: 8px;
      padding: .6em 2em;
      font-family: inherit;
      font-size: .95em;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    #launch-btn:hover { background: #ff79c6; color: #000; }
    #launch-btn:disabled { opacity: .4; cursor: default; }

    /* ── Save action buttons (upload screen) ── */
    #upload-save-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: .5em;
      margin-top: .5em;
    }
    #upload-save-actions button {
      background: #000;
      color: #aaa;
      border: 1px solid #333;
      border-radius: 6px;
      padding: .45em .9em;
      font-family: inherit;
      font-size: .78em;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    #upload-save-actions button:hover { border-color: #ff79c6; color: #ff79c6; }
    #upload-save-actions button:disabled { opacity: .4; cursor: default; }

    /* ── Game canvas ── */
    #canvas-container {
      display: none;
      width: 100vw;
      height: 100vh;
      position: fixed;
      inset: 0;
      justify-content: center;
      align-items: center;
      background: #000;
      overflow: hidden;
    }
    canvas#canvas {
      display: block;
      background: #000;
      outline: 0;
    }

    #pvz-soft-keyboard {
      position: fixed; top: 0; left: 0;
      width: 1px; height: 1px;
      padding: 0; border: 0;
      opacity: 0; resize: none;
      pointer-events: none;
      font-size: 16px;
    }

    /* ── In-game save toolbar (now with IMPORT button alongside EXPORT) ── */
    #save-toolbar {
      position: absolute;
      top: 8px; right: 8px;
      display: flex;
      gap: 6px;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: calc(100vw - 16px);
    }
    #save-toolbar button {
      background: rgba(0,0,0,.7);
      color: #ff79c6;
      border: 1px solid #ff79c6;
      border-radius: 6px;
      padding: .35em .8em;
      font-family: inherit;
      font-size: .82em;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background .2s;
    }
    #save-toolbar button:hover { background: rgba(255,121,198,.15); }
    #save-toolbar button:disabled { opacity: .4; cursor: default; }

    @media (max-height: 700px), (max-width: 600px) {
      body.upload-mode { justify-content: flex-start; }
      #upload-screen { padding: 1.25em 1em 2em; justify-content: flex-start; }
      #ritsu-gif { width: 120px; height: 120px; margin-bottom: 16px; }
    }
  </style>
</head>
<body class="upload-mode" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 0;">

<div id="upload-screen">
  <h1>loading :3 </h1>
  <img id="ritsu-gif" src="./ritsu.gif" alt="ritsu" width="200" height="200" style="margin-bottom: 24px;">
  <!-- file-row progress entries injected by JS -->
  <div id="server-load-wrap"></div>

  <p id="resources-ready-msg">all resources ready</p>
  <div id="loading-drop-zone"></div>

<div id="canvas-container">
  <div id="save-toolbar">
    <button id="save-export-btn">Export Saves</button>
    <button id="save-import-btn">Import Saves (ZIP)</button>
  </div>
  <canvas id="canvas" width="800" height="600" tabindex="0"></canvas>
</div>
<textarea id="pvz-soft-keyboard" autocapitalize="off" autocomplete="off" autocorrect="off" enterkeyhint="done" spellcheck="false"></textarea>

<!-- hidden file input used by in-game import button -->
<input id="ingame-save-import-input" type="file" style="display:none" accept=".zip">

<script>
window.moduleReadyPromise = new Promise((n, e) => { window._resolveModuleReady = n; window._rejectModuleReady = e; });
var Module = {
  canvas: document.getElementById("canvas"),
  noInitialRun: true,
  onRuntimeInitialized: function() { window._resolveModuleReady(); },
  onAbort: function(n) { window._rejectModuleReady(new Error(n)); },
  print: function(n) { console.log(n); },
  printErr: function(n) { console.warn(n); }
};
</script>
<script src="pvz-portable.js" async></script>
<script>
"use strict";

// ----------------------------------------------------------------------
// PvZ Portable Loader — AUTO-START MODE + IN-GAME IMPORT BUTTON
// - Automatically starts game once resources + WASM are ready.
// - Adds an "Import Saves (ZIP)" button right next to "Export Saves" inside the game.
// - All save operations (export, import, clear) share same IndexedDB backend.
// ----------------------------------------------------------------------

const PAK_PARTS = ["main.pak.part0","main.pak.part1","main.pak.part2"];
const PROPERTIES_FILES = [
  "properties/Layout.xml","properties/default.xml","properties/partner.xml",
  "properties/partner.xml.sig","properties/partner_logo.jpg"
];

const collectedFiles = new Map();
let savesMounted = false;
let gameStarted = false;
let saveSyncIntervalId = null;
let saveSyncInFlight = null;
let saveSyncQueued = false;
let lastSaveSyncAt = 0;
let saveFsReadyPromise = null;
let allResourcesReady = false;
let runtimeReloadScheduled = false;
let wasmReady = false;
let autoStartTriggered = false;

const serverLoadWrap   = document.getElementById("server-load-wrap");
const loadStatus       = document.getElementById("loading-drop-zone");
const resourcesReadyMsg= document.getElementById("resources-ready-msg");
const launchBtn        = document.getElementById("launch-btn");
const uploadSaveImportBtn    = document.getElementById("upload-save-import-btn");
const uploadSaveImportDirBtn = document.getElementById("upload-save-import-dir-btn");
const uploadSaveClearBtn     = document.getElementById("upload-save-clear-btn");
const uploadSaveImportInput    = document.getElementById("upload-save-import-input");
const uploadSaveImportDirInput = document.getElementById("upload-save-import-dir-input");

// In-game elements
const ingameExportBtn = document.getElementById("save-export-btn");
const ingameImportBtn = document.getElementById("save-import-btn");
const ingameFileInput = document.getElementById("ingame-save-import-input");

// ── File-row UI helpers ──────────────────────────────────────────────────
function makeFileRow(label) {
  const row = document.createElement("div");
  row.className = "file-row";
  const nameEl   = document.createElement("span");
  nameEl.className = "file-name";
  nameEl.textContent = label + ":";
  const statusEl = document.createElement("span");
  statusEl.className = "file-status pending";
  statusEl.textContent = "waiting...";
  row.appendChild(nameEl);
  row.appendChild(statusEl);
  serverLoadWrap.appendChild(row);
  return {
    setProgress(pct) { statusEl.textContent = Math.round(pct) + "%"; },
    setDone(sizeBytes) {
      statusEl.textContent = sizeBytes != null
        ? "done ✓ (" + (sizeBytes/1048576).toFixed(1) + " MB)"
        : "done ✓";
      statusEl.classList.add("done");
    },
    setError(msg) {
      statusEl.textContent = "✗ error";
      statusEl.classList.add("error");
      row.title = msg;
    }
  };
}

// ── Fetch with progress ──────────────────────────────────────────────────
async function fetchWithProgress(url, onProgress) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error("HTTP " + resp.status + " for " + url);
  const total = parseInt(resp.headers.get("content-length") || "0", 10);
  const reader = resp.body.getReader();
  const chunks = []; let received = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value); received += value.length;
    if (total > 0) onProgress(received / total * 100);
  }
  const out = new Uint8Array(received); let offset = 0;
  for (const c of chunks) { out.set(c, offset); offset += c.length; }
  return out.buffer;
}

// ── Fetch & merge main.pak ───────────────────────────────────────────────
async function fetchPak() {
  const row = makeFileRow("main.pak");
  try {
    const buffers = [];
    for (let i = 0; i < PAK_PARTS.length; i++) {
      row.setProgress((i / PAK_PARTS.length) * 100);
      const buf = await fetchWithProgress(PAK_PARTS[i], pct => {
        row.setProgress((i / PAK_PARTS.length) * 100 + pct / PAK_PARTS.length);
      });
      buffers.push(buf);
    }
    const total = buffers.reduce((s, b) => s + b.byteLength, 0);
    const merged = new Uint8Array(total); let off = 0;
    for (const b of buffers) { merged.set(new Uint8Array(b), off); off += b.byteLength; }
    collectedFiles.set("main.pak", new File([merged], "main.pak", { type: "application/octet-stream" }));
    row.setDone(total);
  } catch(e) { row.setError(e.message); throw e; }
}

// ── Fetch properties/ files ──────────────────────────────────────────────
async function fetchProperties() {
  const promises = PROPERTIES_FILES.map(async path => {
    const row = makeFileRow(path);
    try {
      const buf = await fetchWithProgress(path, pct => row.setProgress(pct));
      collectedFiles.set(path, new File([buf], path.split("/").pop(), { type: "application/octet-stream" }));
      row.setDone(buf.byteLength);
    } catch(e) { row.setError(e.message); throw e; }
  });
  await Promise.all(promises);
}

// ── Kick off all fetches ─────────────────────────────────────────────────
async function fetchAllResources() {
  try {
    await Promise.all([fetchPak(), fetchProperties()]);
    allResourcesReady = true;
    resourcesReadyMsg.style.display = "block";
    tryAutoStart();
  } catch(e) {
    loadStatus.textContent = "⚠ Failed to load resources: " + e.message;
    loadStatus.classList.add("has-error");
    loadStatus.style.display = "block";
  }
}

// ── Save FS helpers (shared) ─────────────────────────────────────────────
function canSyncSaves(){return savesMounted && Module.FS && typeof Module.FS.syncfs === "function";}
async function ensureSaveFsReady(){
  if(saveFsReadyPromise) return saveFsReadyPromise;
  saveFsReadyPromise = (async () => {
    await window.moduleReadyPromise;
    try { Module.FS.mkdir("/saves"); } catch(e) {}
    try { Module.FS.mount(Module.FS.filesystems.IDBFS, {}, "/saves"); } catch(e) { console.warn("mount IDBFS:", e); }
    savesMounted = true;
    await new Promise(r => Module.FS.syncfs(true, err => { if(err) console.warn("IDBFS sync error:", err); r(); }));
    lastSaveSyncAt = Date.now();
  })();
  return saveFsReadyPromise;
}

async function syncSaves(){
  if(!canSyncSaves()) return;
  if(saveSyncInFlight) { saveSyncQueued = true; return saveSyncInFlight; }
  saveSyncInFlight = new Promise(r => Module.FS.syncfs(false, err => { if(err) console.warn("IDBFS persist error:", err); else lastSaveSyncAt = Date.now(); r(); }));
  try { await saveSyncInFlight; } finally { saveSyncInFlight = null; if(saveSyncQueued) { saveSyncQueued = false; syncSaves(); } }
}
function startSaveAutosync(){ if(saveSyncIntervalId === null) saveSyncIntervalId = setInterval(syncSaves, 5000); }

// ── Canvas resize ────────────────────────────────────────────────────────
function resizeCanvas(){
  const c = document.getElementById("canvas"), ct = document.getElementById("canvas-container");
  const s = Math.min(ct.clientWidth / c.width, ct.clientHeight / c.height);
  c.style.width = Math.floor(c.width * s) + "px";
  c.style.height = Math.floor(c.height * s) + "px";
}

// ── AUTO-START condition ─────────────────────────────────────────────────
function tryAutoStart() {
  if(autoStartTriggered) return;
  if(!allResourcesReady || !wasmReady) return;
  autoStartTriggered = true;
  Promise.resolve().then(() => startGame());
}

// ── Game launch (automatic) ──────────────────────────────────────────────
async function startGame() {
  if(gameStarted) return;
  if(!allResourcesReady) return;
  if(launchBtn) launchBtn.disabled = true;
  loadStatus.textContent = "preparing WebAssembly runtime & resources…";
  loadStatus.classList.remove("has-error");
  loadStatus.style.display = "block";
  try {
    await window.moduleReadyPromise;
    const entries = Array.from(collectedFiles.entries());
    let written = 0;
    const totalBytes = entries.reduce((s,[,f]) => s + f.size, 0);
    for(let i = 0; i < entries.length; i++) {
      const [path, file] = entries[i];
      loadStatus.textContent = "writing resources… " + (i+1) + "/" + entries.length + ", " + (written/1048576).toFixed(1) + "/" + (totalBytes/1048576).toFixed(1) + " MiB";
      const data = new Uint8Array(await file.arrayBuffer());
      const parts = path.split("/");
      let dir = "/";
      for(let d = 0; d < parts.length - 1; d++) {
        dir += (dir === "/" ? "" : "/") + parts[d];
        try { Module.FS.mkdir(dir); } catch(e) {}
      }
      Module.FS.writeFile("/" + path, data);
      written += file.size;
      if((i+1) % 4 === 0) await new Promise(r => setTimeout(r, 0));
    }
    loadStatus.textContent = "restoring saved data…";
    await ensureSaveFsReady();
    document.body.classList.replace("upload-mode", "game-mode");
    document.getElementById("upload-screen").style.display = "none";
    const cc = document.getElementById("canvas-container");
    cc.style.display = "flex";
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    loadStatus.style.display = "none";
    gameStarted = true;
    lastSaveSyncAt = Date.now();
    startSaveAutosync();
    Module.callMain([]);
  } catch(e) {
    console.error("Failed to start game:", e);
    loadStatus.textContent = "Error: " + (e.message || e);
    loadStatus.classList.add("has-error");
    document.getElementById("canvas-container").style.display = "none";
    document.getElementById("upload-screen").style.display = "";
    document.body.classList.replace("game-mode", "upload-mode");
    if(launchBtn) launchBtn.disabled = false;
    autoStartTriggered = false;
  }
}

// Listen for WASM runtime ready
window.moduleReadyPromise.then(() => {
  wasmReady = true;
  tryAutoStart();
}).catch(err => {
  console.error("WASM runtime failed:", err);
  loadStatus.textContent = "⚠ WebAssembly runtime error: " + (err.message || err);
  loadStatus.classList.add("has-error");
  loadStatus.style.display = "block";
});

fetchAllResources();

// ── CORE SAVE MANAGEMENT (Export, Import ZIP, Clear) ─────────────────────
function collectSaveFiles(baseDir) {
  const results = [];
  let items;
  try { items = Module.FS.readdir(baseDir); } catch(e) { return results; }
  for(const name of items) {
    if(name === "." || name === "..") continue;
    const fullPath = baseDir + "/" + name;
    const st = Module.FS.stat(fullPath);
    if(Module.FS.isDir(st.mode)) {
      results.push(...collectSaveFiles(fullPath));
    } else {
      results.push(fullPath);
    }
  }
  return results;
}

async function exportSaves(buttonEl) {
  if(!gameStarted) { alert("Game not started yet."); return; }
  buttonEl.disabled = true;
  const originalText = buttonEl.textContent;
  buttonEl.textContent = "Exporting…";
  try {
    await ensureSaveFsReady();
    await syncSaves();
    const allSaveFiles = collectSaveFiles("/saves/userdata");
    if(!allSaveFiles.length) { alert("No save data found."); return; }
    const zip = new JSZip();
    for(const fullPath of allSaveFiles) {
      const relative = fullPath.replace(/^\/saves\//, "");
      const content = Module.FS.readFile(fullPath);
      zip.file(relative, content);
    }
    const blob = await zip.generateAsync({ type: "blob" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "pvz-portable-savedata.zip";
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(err) {
    console.error("Export failed:", err);
    alert("Export failed: " + err.message);
  } finally {
    buttonEl.disabled = false;
    buttonEl.textContent = originalText;
  }
}

async function importSavesFromZip(zipFile, buttonEl) {
  if(!gameStarted) { alert("Game not started yet."); return; }
  buttonEl.disabled = true;
  const originalText = buttonEl.textContent;
  buttonEl.textContent = "Importing…";
  try {
    await ensureSaveFsReady();
    const zip = await JSZip.loadAsync(zipFile);
    const filePaths = Object.keys(zip.files).filter(k => !zip.files[k].dir);
    for(const relPath of filePaths) {
      let targetPath = relPath;
      if(!targetPath.startsWith("userdata/") && !targetPath.startsWith("/userdata/")) {
        targetPath = "userdata/" + targetPath;
      }
      targetPath = targetPath.replace(/^\/+/, "");
      const fullDest = "/saves/" + targetPath;
      const parts = fullDest.split("/");
      let currentDir = "";
      for(let i = 1; i < parts.length - 1; i++) {
        currentDir += "/" + parts[i];
        try { Module.FS.mkdir(currentDir); } catch(e) {}
      }
      const fileData = await zip.files[relPath].async("uint8array");
      Module.FS.writeFile(fullDest, fileData);
    }
    await syncSaves();
    alert("Save import completed. Game state will reflect changes after reload or next level load.\n(Some progress may require restarting the game session for full effect.)");
  } catch(err) {
    console.error("Import failed:", err);
    alert("Import failed: " + err.message);
  } finally {
    buttonEl.disabled = false;
    buttonEl.textContent = originalText;
  }
}

async function clearAllSaves(buttonEl) {
  if(!gameStarted) { alert("Game not started."); return; }
  if(!confirm("⚠️ This will permanently delete ALL save data from your browser for this game.\nThis action cannot be undone. Continue?")) return;
  buttonEl.disabled = true;
  const original = buttonEl.textContent;
  buttonEl.textContent = "⏳ Clearing…";
  try {
    await ensureSaveFsReady();
    const files = collectSaveFiles("/saves");
    for(const f of files) {
      try { Module.FS.unlink(f); } catch(e) {}
    }
    function rmdirRecursive(d) {
      let list;
      try { list = Module.FS.readdir(d); } catch(e) { return; }
      for(const entry of list) {
        if(entry === "." || entry === "..") continue;
        const p = d + "/" + entry;
        try {
          const st = Module.FS.stat(p);
          if(Module.FS.isDir(st.mode)) rmdirRecursive(p);
          else Module.FS.unlink(p);
        } catch(e) {}
      }
      if(d !== "/saves") try { Module.FS.rmdir(d); } catch(e) {}
    }
    rmdirRecursive("/saves");
    try { Module.FS.mkdir("/saves"); } catch(e) {}
    try { Module.FS.mkdir("/saves/userdata"); } catch(e) {}
    await syncSaves();
    alert("All save data has been cleared.");
  } catch(err) {
    console.error("Clear failed:", err);
    alert("Clear failed: " + err.message);
  } finally {
    buttonEl.disabled = false;
    buttonEl.textContent = original;
  }
}

// ── Attach event handlers for upload screen + in-game toolbar ────────────
// Upload screen handlers (preserved)
uploadSaveImportBtn.addEventListener("click", () => uploadSaveImportInput.click());
uploadSaveImportInput.addEventListener("change", async e => {
  const file = e.target.files[0];
  if(file && gameStarted) await importSavesFromZip(file, uploadSaveImportBtn);
  else if(file && !gameStarted) alert("Game is not running yet. Please wait for game to start before importing saves.");
  e.target.value = "";
});
uploadSaveImportDirBtn.addEventListener("click", () => uploadSaveImportDirInput.click());
uploadSaveImportDirInput.addEventListener("change", async e => {
  const files = Array.from(e.target.files);
  if(files.length && gameStarted) {
    alert("Folder import (multiple files) not directly supported for in-game. Please use ZIP import for simplicity.");
  } else if(files.length && !gameStarted) alert("Game not running.");
  e.target.value = "";
});
uploadSaveClearBtn.addEventListener("click", () => { if(gameStarted) clearAllSaves(uploadSaveClearBtn); else alert("Wait for game to start."); });

// In-game buttons
ingameExportBtn.addEventListener("click", () => exportSaves(ingameExportBtn));
ingameImportBtn.addEventListener("click", () => ingameFileInput.click());
ingameFileInput.addEventListener("change", async e => {
  const file = e.target.files[0];
  if(file && gameStarted) await importSavesFromZip(file, ingameImportBtn);
  else if(file && !gameStarted) alert("Game not ready.");
  e.target.value = "";
});

// Autosync on page visibility / unload
document.addEventListener("visibilitychange", () => { if(document.visibilityState === "hidden") syncSaves(); });
window.addEventListener("pagehide", syncSaves);
window.addEventListener("beforeunload", e => {
  if(gameStarted) {
    syncSaves();
    if(Date.now() - lastSaveSyncAt >= 7000) {
      e.preventDefault();
      e.returnValue = "Save data syncing…";
    }
  }
});

window.onGameExit = function() {
  gameStarted = false;
  if(saveSyncIntervalId !== null) { clearInterval(saveSyncIntervalId); saveSyncIntervalId = null; }
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  document.getElementById("canvas-container").style.display = "none";
  document.getElementById("upload-screen").style.display = "";
  document.body.classList.replace("game-mode", "upload-mode");
  window.removeEventListener("resize", resizeCanvas);
  loadStatus.style.display = "none";
  if(launchBtn) launchBtn.disabled = false;
  if(!runtimeReloadScheduled) {
    runtimeReloadScheduled = true;
    loadStatus.textContent = "Resetting WebAssembly runtime…";
    loadStatus.style.display = "block";
    setTimeout(() => window.location.reload(), 0);
  }
};
</script>
</body>
</html>
